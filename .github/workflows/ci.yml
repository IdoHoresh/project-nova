name: CI

# Triggers — tightened from the original "every push to every branch" pattern
# (which fired CI twice per PR commit: once on push, once on pull_request).
# Now CI runs on:
#   - PRs into main (every commit added to a PR re-runs)
#   - direct pushes to main (post-merge sanity check + protection against
#     accidental direct commits)
# Feature-branch pushes WITHOUT an open PR don't run CI by design — branch
# protection on main is the contract; intermediate states aren't worth the
# minutes. Open the PR early if you want feedback while iterating.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch.
# Saves CI minutes on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default minimal permissions — give jobs only what they need.
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # nova-agent — Python cognitive architecture
  # ─────────────────────────────────────────────────────────────────────────
  agent:
    name: nova-agent (pytest + mypy + ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: nova-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history for git-blame in failure reports
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          # Lock the uv version so CI is reproducible
          version: "0.5.13"

      - name: Install tesseract OCR (used by perception tests)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Sync dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest --tb=short -p no:warnings

      - name: Run mypy (strict)
        run: uv run mypy

      - name: Run ruff (lint)
        run: uv run ruff check

      - name: Run ruff (format check)
        run: uv run ruff format --check

  # ─────────────────────────────────────────────────────────────────────────
  # nova-viewer — Next.js + React + Tailwind brain panel
  # Also runs `pnpm audit` here so we don't pay for a second pnpm install in
  # a separate security job. Audit is non-blocking until we're closer to
  # production (Phase 5+).
  # ─────────────────────────────────────────────────────────────────────────
  viewer:
    name: nova-viewer (vitest + tsc + eslint + audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: nova-viewer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match the version locally installed. Project moved to pnpm 11 in
          # commit e322872 (allowBuilds for esbuild/sharp/unrs-resolver). pnpm
          # 10 chokes on pnpm 11's lockfile-overrides encoding (ERR_PNPM_
          # LOCKFILE_CONFIG_MISMATCH on package.json's pnpm.overrides).
          version: 11
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest
        run: pnpm test

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Run eslint
        run: pnpm run lint

      - name: Build (production)
        run: pnpm run build

      - name: Upload viewer build artifact
        # Cheap insurance against "but it builds locally!" — keep the
        # production build for 7 days for visual smoke checks on PRs.
        uses: actions/upload-artifact@v4
        with:
          name: viewer-build-${{ github.sha }}
          path: nova-viewer/.next/
          retention-days: 7

      - name: Run pnpm audit (production deps, high+)
        # Audit findings are non-blocking until we have a customer or a
        # production deploy. Bumped from --audit-level=moderate to high
        # because moderate floods on transitive devDeps and trains us to
        # ignore the signal. Re-tighten before Phase 5.
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # Secret scanning — small, parallel, no node deps.
  # Standalone job so a future deploy / multi-package layout can scan history
  # independently of any subproject's install step.
  # ─────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Composite "all-green" gate for branch protection.
  # Wire main's branch protection to require this single check; that way
  # adding/removing upstream jobs doesn't require touching branch-protection
  # config in the GitHub UI.
  # ─────────────────────────────────────────────────────────────────────────
  all-green:
    name: All checks passed
    needs: [agent, viewer, gitleaks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all dependent jobs passed
        run: |
          if [[ "${{ needs.agent.result }}" != "success" ]]; then
            echo "::error::nova-agent job failed"
            exit 1
          fi
          if [[ "${{ needs.viewer.result }}" != "success" ]]; then
            echo "::error::nova-viewer job failed"
            exit 1
          fi
          if [[ "${{ needs.gitleaks.result }}" != "success" ]]; then
            echo "::error::gitleaks job failed"
            exit 1
          fi
          echo "All CI jobs passed."
