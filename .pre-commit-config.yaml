# Pre-commit configuration for Project Nova.
# https://pre-commit.com/
#
# Install hooks (one-time per clone):
#   pip install pre-commit  # or: brew install pre-commit
#   pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files
#
# Run automatically on every `git commit` for staged files only.
# Bypassing requires --no-verify which is forbidden by project policy
# unless the user explicitly authorizes it.

repos:
  # ─── universal hygiene ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # Markdown trailing whitespace is significant (line break) — preserve
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^nova-agent/data/  # local fixtures may have intentionally invalid YAML
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=512]  # warn on files > 512 KB; use git-lfs for binaries
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ─── secret scanning (defense-in-depth alongside gitleaks) ─────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ─── Python (nova-agent) ───────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^nova-agent/.*\.py$
      - id: ruff-format
        files: ^nova-agent/.*\.py$

  # ─── JavaScript / TypeScript (nova-viewer) ─────────────────────────────────
  # We rely on local pnpm + node, not pre-commit-managed mirror, because
  # nova-viewer's eslint-config-next + tsc need the workspace's full
  # package.json + tsconfig.json + node_modules. Mirror-based pre-commit
  # hooks for ESLint don't pick those up correctly.
  - repo: local
    hooks:
      - id: eslint-viewer
        name: eslint (nova-viewer)
        language: system
        files: ^nova-viewer/(app|lib)/.*\.(ts|tsx|js|jsx)$
        # cd into nova-viewer and run pnpm lint targeted at the changed files.
        # pre-commit passes repo-relative paths (e.g. "nova-viewer/lib/foo.ts");
        # strip the "nova-viewer/" prefix so eslint resolves them after the cd.
        entry: bash -c 'cd nova-viewer && args=(); for f in "$@"; do args+=("${f#nova-viewer/}"); done; pnpm exec eslint --max-warnings=0 "${args[@]}"' --
        require_serial: false

      - id: tsc-viewer
        name: tsc --noEmit (nova-viewer)
        language: system
        files: ^nova-viewer/(app|lib)/.*\.(ts|tsx)$
        pass_filenames: false
        entry: bash -c 'cd nova-viewer && npx tsc --noEmit'
        require_serial: true

      - id: prettier-viewer
        name: prettier (nova-viewer)
        language: system
        files: ^nova-viewer/(app|lib)/.*\.(ts|tsx|js|jsx|json|css|md)$
        # Run via pnpm exec so we use the workspace prettier if installed
        # (and gracefully skip if not — pnpm exec returns non-zero, and we
        # accept it as "no prettier configured yet"). To enforce strictly,
        # add prettier to package.json devDependencies.
        # Prefix-strip mirrors eslint-viewer above.
        entry: bash -c 'cd nova-viewer && args=(); for f in "$@"; do args+=("${f#nova-viewer/}"); done; pnpm exec prettier --check "${args[@]}" 2>/dev/null || echo "(prettier not configured; skipping)"' --

  # ─── Markdown ──────────────────────────────────────────────────────────────
  # Lightweight markdown linter — catches broken links, malformed tables, etc.
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.yaml, --ignore, node_modules, --ignore, .next]
        # Disabled until .markdownlint.yaml is added; uncomment when ready.
        # For now skip markdown linting; revisit in Tier 2.
        stages: [manual]

  # ─── conventional commits ──────────────────────────────────────────────────
  # Commit-msg hook that enforces conventional-commits format.
  # Runs at commit time on the message content.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []  # default config: feat/fix/docs/style/refactor/test/chore/build/ci/perf/revert

  # ─── Claude Code pre-commit checklist enforcement ──────────────────────────
  # Blocks commits if any item in .claude/pre-commit-checklist.md is unchecked,
  # then resets the checklist after a successful commit. Pattern adopted from
  # the Gibor app workflow.
  #
  # First-time setup (per clone): the post-commit hook needs explicit install:
  #   pre-commit install --hook-type post-commit
  - repo: local
    hooks:
      - id: claude-checklist-check
        name: Claude pre-commit checklist (block on unchecked)
        language: system
        pass_filenames: false
        always_run: true
        entry: bash scripts/check-claude-checklist.sh

      - id: claude-checklist-reset
        name: Claude pre-commit checklist (reset after commit)
        language: system
        pass_filenames: false
        always_run: true
        stages: [post-commit]
        entry: bash scripts/reset-checklist.sh

# Default settings
default_language_version:
  python: python3.11
default_stages: [pre-commit]
fail_fast: false  # run all hooks even if one fails (so user sees full picture)
